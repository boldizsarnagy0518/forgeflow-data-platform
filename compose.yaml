name: forgeflow

x-app-security: &app-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgeflow}
      POSTGRES_USER: ${POSTGRES_USER:-forgeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forgeflow_local_only}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-forgeflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-forgeflow_local_only}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
    <<: *app-security

  minio-init:
    profiles: ["init"]
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc --config-dir /tmp/.mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc --config-dir /tmp/.mc mb --ignore-existing "local/$${FORGEFLOW_S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-forgeflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-forgeflow_local_only}
      FORGEFLOW_S3_BUCKET: ${FORGEFLOW_S3_BUCKET:-forgeflow-raw}
    tmpfs:
      - /tmp
    <<: *app-security

  api:
    profiles: ["app"]
    build: .
    command: ["forgeflow-api"]
    environment:
      FORGEFLOW_DATABASE_URL: postgresql://forgeflow_reader:forgeflow_reader_local_only@postgres:5432/${POSTGRES_DB:-forgeflow}
      FORGEFLOW_API_HOST: 0.0.0.0
      FORGEFLOW_S3_ACCESS_KEY: not-configured
      FORGEFLOW_S3_SECRET_KEY: not-configured
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    read_only: true
    tmpfs: [/tmp]
    <<: *app-security

  dashboard:
    profiles: ["app"]
    build: .
    command: ["forgeflow-dashboard"]
    environment:
      FORGEFLOW_DATABASE_URL: postgresql://forgeflow_reader:forgeflow_reader_local_only@postgres:5432/${POSTGRES_DB:-forgeflow}
      FORGEFLOW_DASHBOARD_HOST: 0.0.0.0
      FORGEFLOW_S3_ACCESS_KEY: not-configured
      FORGEFLOW_S3_SECRET_KEY: not-configured
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    read_only: true
    tmpfs: [/tmp]
    <<: *app-security

volumes:
  postgres-data:
  minio-data:
